# /etc/nginx/sites-available/ats.rajasekarselvam.com  (symlinked from sites-enabled/)
#
# ATS cockpit at ats.rajasekarselvam.com.
# - Apex (rajasekarselvam.com) stays with Hostinger; this server block does not touch it.
# - Static site at /var/www/ats.rajasekarselvam.com/
# - Node backend at 127.0.0.1:8080 (run in a Docker container; same loopback port)
# - WebSocket at /ws
# - Certbot will rewrite the listen 443 ssl lines on first run:
#     sudo certbot --nginx -d ats.rajasekarselvam.com

# Rate-limit zones (declared once per file; reused by both /api and /ws locations).
limit_req_zone $binary_remote_addr zone=ats_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ats_ws:10m  rate=10r/s;

upstream ats_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ---------- HTTP -> HTTPS ----------
server {
    listen      80;
    listen      [::]:80;
    server_name ats.rajasekarselvam.com;

    location /.well-known/acme-challenge/ {
        include /etc/nginx/snippets/ats-security-headers.conf;
        root /var/www/letsencrypt;
    }
    location / {
        include /etc/nginx/snippets/ats-security-headers.conf;
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS ----------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name ats.rajasekarselvam.com;

    ssl_certificate     /etc/letsencrypt/live/ats.rajasekarselvam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ats.rajasekarselvam.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Tier 30: security headers now live in a separate snippet that is
    # `include`d at the top of every location block (server-level
    # add_header is silently overridden when any location defines its
    # own add_header, e.g. Cache-Control below).

    gzip              on;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length   512;
    gzip_vary         on;

    location /.well-known/acme-challenge/ {
        include /etc/nginx/snippets/ats-security-headers.conf;
        root /var/www/letsencrypt;
    }

    # ---------- Static site ----------
    root  /var/www/ats.rajasekarselvam.com;
    index app.html;

    # T-323: switched from max-age=0+must-revalidate to no-store after
    # Chrome was observed serving stale /src/*.js bundles even with
    # must-revalidate set (T-322a/c investigation: cache returned the old
    # screen-attribution.js without the regimeLabel fix even after the
    # new bundle deployed). With no-store, the browser cannot cache the
    # file at all; every load fetches fresh. Cost is ~50KB of bundles
    # re-downloaded per page load, which is negligible for a logged-in
    # single-operator app. If this app ever ships to many concurrent
    # users we should switch to hashed filenames (?v=BUILD_SHA) instead.
    location ~* \.(js|jsx|css)$ {
        include /etc/nginx/snippets/ats-security-headers.conf;
        expires -1;
        add_header Cache-Control "no-store";
        etag off;
        try_files $uri =404;
    }

    # Images + fonts: content URLs rarely change. Keep long max-age but
    # drop `immutable` so a hard refresh can still bust if needed.
    location ~* \.(png|jpg|jpeg|gif|svg|woff2|ico)$ {
        include /etc/nginx/snippets/ats-security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # T-I2: public status page (no auth, no login flow).
    location = /status {
        include /etc/nginx/snippets/ats-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /status.html =404;
    }

    # T-I3: public docs page.
    location = /docs {
        include /etc/nginx/snippets/ats-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /docs.html =404;
    }

    # T-I6: public legal page (Privacy + Terms + DPA drafts).
    location = /legal {
        include /etc/nginx/snippets/ats-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /legal.html =404;
    }

    location / {
        include /etc/nginx/snippets/ats-security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /app.html;
    }

    # ---------- OPTIONAL: HTTP basic auth gate ----------
    # Uncomment two lines below to require a username/password while in pre-release.
    #   sudo apt install -y apache2-utils
    #   sudo htpasswd -c /etc/nginx/.htpasswd rajasekar
    #
    # auth_basic           "Private — ATS beta";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # ---------- Backend API ----------
    # T-412: health-check endpoints (/api/health, /api/health-deep, /api/status)
    # bypass the ats_api rate-limit zone. The Playwright CI suite + Pingdom +
    # nginx upstream health-checks together easily exceed the 30 r/s + burst=60
    # window on a single runner IP, and a 503 from limit_req at this layer
    # cascades into structural-rendering test failures (the app shell never
    # confirms backend ready). These endpoints are public, idempotent, in-memory
    # reads with no DB/broker round-trip -- safe to exclude. Backend-side
    # bypass is also in place (T-411, server.js RATE_LIMIT_BYPASS) so neither
    # layer throttles them.
    location = /api/health {
        include /etc/nginx/snippets/ats-security-headers.conf;
        proxy_pass http://ats_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_set_header   X-ATS-Internal    "";
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }
    location = /api/health-deep {
        include /etc/nginx/snippets/ats-security-headers.conf;
        proxy_pass http://ats_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_set_header   X-ATS-Internal    "";
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }
    location = /api/status {
        include /etc/nginx/snippets/ats-security-headers.conf;
        proxy_pass http://ats_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $rem