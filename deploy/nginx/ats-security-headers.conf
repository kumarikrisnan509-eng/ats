# /etc/nginx/snippets/ats-security-headers.conf
#
# Tier 30 (+ T-423 hardening): security headers, applied via `include`
# from inside every location block in ats.rajasekarselvam.com.conf.
#
# Why a snippet + include: nginx silently ignores SERVER-LEVEL add_header
# directives if ANY location block in that server defines its own add_header.
#
# T-423 (audit-2026-05-26 infra finding #6 + sec-ops cross-cutting):
#   - Dropped `https:` wildcard from connect-src + img-src
#     (any XSS could exfil to attacker.com over https). Now restricted to
#     specific origins the app actually uses.
#   - Added object-src 'none', worker-src 'self', frame-src 'none'.
#   - Added Cross-Origin-Opener-Policy + Cross-Origin-Resource-Policy
#     so cross-origin window/resource attacks are blocked (Spectre defense).
#   - Tightened Permissions-Policy: explicitly deny all sensors+APIs.
#   - script-src + style-src still allow 'unsafe-inline' (React inline
#     event handlers + style props) and script-src allows 'unsafe-eval'
#     (React UMD dev build). Removing those requires a frontend build
#     refactor -- deferred.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
# T-465 (audit-2026-05-26 infra L2): removed X-Frame-Options "DENY".
# CSP frame-ancestors 'none' (set in the Content-Security-Policy line
# below) supersedes XFO in every modern browser and the W3C
# Web Application Security WG marked XFO obsolete in 2022. Keeping it
# was just header bloat. If you need to support IE11 or other ancient
# browsers, restore by uncommenting:
#   add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' wss://ats.rajasekarselvam.com; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; worker-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
