# /etc/nginx/snippets/ats-security-headers.conf
#
# Tier 30: hardened security headers, applied via `include` from inside
# every location block in ats.rajasekarselvam.com.conf.
#
# Why a snippet + include: nginx silently ignores SERVER-LEVEL add_header
# directives if ANY location block in that server defines its own add_header.
# The site config has location-level add_header (Cache-Control, robots.txt
# Content-Type), so server-level security headers never reached the client.
# The fix is to include this snippet as the first directive in each
# location { ... } block.
#
# Production source-of-truth: this file installed at
# /etc/nginx/snippets/ats-security-headers.conf on the VM by
# FIX-NGINX-HEADERS.cmd / deploy/scripts/fix-nginx-headers.ps1.

add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
