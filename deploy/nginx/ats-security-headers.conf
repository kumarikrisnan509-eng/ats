# /etc/nginx/snippets/ats-security-headers.conf
#
# Tier 30 (+ 30.2 CSP fix): hardened security headers, applied via `include`
# from inside every location block in ats.rajasekarselvam.com.conf.
#
# Why a snippet + include: nginx silently ignores SERVER-LEVEL add_header
# directives if ANY location block in that server defines its own add_header.
#
# Tier 30.2 update: CSP widened to allow the CDNs app.html actually uses:
#   - React UMD from https://unpkg.com (also cdnjs.cloudflare.com for chart libs)
#   - Google Fonts CSS (fonts.googleapis.com) and font files (fonts.gstatic.com)
#   - blob: imgs for chart screenshots, wss: for /ws WebSocket

add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; connect-src 'self' wss: https:; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
