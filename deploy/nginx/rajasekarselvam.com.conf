# /etc/nginx/conf.d/rajasekarselvam.com.conf
#
# Nginx config for rajasekarselvam.com — ATS (Automated Trading System) prototype.
# Place this file at /etc/nginx/conf.d/rajasekarselvam.com.conf on the Oracle Cloud Linux VM.
# Certbot will edit the TLS lines automatically on first run: `certbot --nginx -d rajasekarselvam.com -d www.rajasekarselvam.com`.
#
# Assumptions:
#   - Static site lives at /var/www/rajasekarselvam.com/
#   - Node backend listens on 127.0.0.1:8080
#   - Let's Encrypt webroot at /var/www/letsencrypt/

# ---------- Rate-limit zones (define once, use per-location) ----------
limit_req_zone  $binary_remote_addr zone=ats_api:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr zone=ats_ws:10m   rate=10r/s;

# ---------- Upstream for the Node backend ----------
upstream ats_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen      80;
    listen      [::]:80;
    server_name rajasekarselvam.com www.rajasekarselvam.com;

    # ACME challenge for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- Redirect apex or www to the canonical host (optional) ----------
# If you want www -> apex:
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name www.rajasekarselvam.com;

    # TLS certs (certbot will fill these in)
    ssl_certificate     /etc/letsencrypt/live/rajasekarselvam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rajasekarselvam.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://rajasekarselvam.com$request_uri;
}

# ---------- Main HTTPS server ----------
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name rajasekarselvam.com;

    # TLS certs
    ssl_certificate     /etc/letsencrypt/live/rajasekarselvam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rajasekarselvam.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # TLS session tuning
    ssl_session_timeout 1d;
    ssl_session_cache   shared:TLS:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS — only enable once you're confident TLS is working.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP is intentionally permissive while the prototype uses Babel Standalone and unpkg.
    # Tighten this once the app is migrated to a pre-built bundle.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss://rajasekarselvam.com https://rajasekarselvam.com; frame-ancestors 'self';" always;

    # Compression
    gzip              on;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length   512;
    gzip_vary         on;

    # Webroot for Let's Encrypt renewals
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # ---------- Static site ----------
    root  /var/www/rajasekarselvam.com;
    index app.html;

    # Cache JSX / CSS / images aggressively; HTML never.
    location ~* \.(jsx|css|js|png|jpg|jpeg|gif|svg|woff2|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    location / {
        # No caching for the shell so updates pick up immediately during beta
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /app.html;
    }

    # ---------- OPTIONAL: Gate the whole prototype with HTTP basic auth ----------
    # Uncomment to put the UI behind a username/password while in pre-release.
    # To create the file:
    #   sudo dnf install -y httpd-tools
    #   sudo htpasswd -c /etc/nginx/.htpasswd rajasekar
    #
    # auth_basic           "Private — ATS beta";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    # ---------- Backend API ----------
    location /api/ {
        limit_req zone=ats_api burst=60 nodelay;

        proxy_pass http://ats_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ---------- WebSocket for live ticks ----------
    location /ws {
        limit_req zone=ats_ws burst=20 nodelay;

        proxy_pass http://ats_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        # Long-lived connections — bump idle timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Deny hidden files
    location ~ /\. { deny all; }

    # robots.txt — block indexing until launch
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }
}
