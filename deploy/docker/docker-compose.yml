# /opt/ats/compose/docker-compose.yml on the Oracle Cloud Linux VM.
# Pulls the image GitHub Actions pushed to GHCR and runs it.
#
# Image tag is parameterised via the ATS_IMAGE_TAG env so deploy.sh can
# pin a specific SHA and roll back by changing it.
#
# Static front-end files live INSIDE the image (at /app/static). The deploy
# script `docker cp`s them out to /var/www/rajasekarselvam.com/ so the host
# Nginx can serve them; no shared volume is needed.

services:
  ats-backend:
    # T-423 (audit-2026-05-26 sec-ops): no :-latest fallback. If ATS_IMAGE_TAG
    # isn't set the compose file must fail loudly rather than silently pull a
    # mutable "latest" tag that breaks reproducibility (and bypasses rollback).
    image: "ghcr.io/${ATS_REPO_OWNER:?ATS_REPO_OWNER must be set in /opt/ats/compose/.env}/ats-backend:${ATS_IMAGE_TAG:?ATS_IMAGE_TAG must be set in /opt/ats/compose/.env}"
    container_name: ats-backend
    # T-449 (audit-2026-05-26 infra M10): switched from `restart: always`
    # to `unless-stopped`. `always` masks crash-loops — a container that
    # fails on startup spins forever burning CPU + log space without ever
    # surfacing to the operator. `unless-stopped` keeps the same crash
    # recovery behaviour BUT allows a deliberate `docker compose stop` /
    # `docker stop ats-backend` to actually stay stopped (so the operator
    # can pull the container offline during an investigation without
    # fighting the supervisor). Crash-loop detection still relies on the
    # 15min check-disk + health-monitor cron — `on-failure:5` would be
    # stricter but risks the daemon staying down across a transient
    # morning-login OOM, which for a real-money system is the worse
    # failure mode.
    restart: unless-stopped
    # Only expose to loopback. Nginx on the host fronts this.
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - /etc/ats/backend.env
    environment:
      # Override paths so they point at host-mounted volumes inside the container.
      AUDIT_LOG: /var/log/ats/audit.log
      MASTER_KEY_PATH: /run/secrets/master.key
      TOKENS_DIR: /var/lib/ats/tokens
      # Tier 79: socket path for the host auto-login daemon (token comes from env_file)
      AUTO_LOGIN_SOCKET: /var/run/ats/auto-login.sock
    volumes:
      # Append-only audit log -- host owns the directory; container appends.
      - type: bind
        source: /var/log/ats
        target: /var/log/ats
      # Sealed per-user Zerodha access tokens + SQLite DB.
      - type: bind
        source: /var/lib/ats/tokens
        target: /var/lib/ats/tokens
      # libsodium master key, read-only.
      - type: bind
        source: /etc/ats/master.key
        target: /run/secrets/master.key
        read_only: true
      # T-443 (audit-2026-05-26 infra M7): narrowed from full /etc/ats bind
      # to ONLY the dr-token file. master.key is still mounted at
      # /run/secrets/ via the separate bind above; backend.env is loaded via
      # env_file at compose level. A path-traversal bug in the backend would
      # previously have leaked every secret in /etc/ats/; now it can only
      # see the one file it actually needs to authenticate the DR cron POST.
      - type: bind
        source: /etc/ats/.dr-token
        target: /etc/ats/.dr-token
        read_only: true
      # Tier 79: bind-mount the host auto-login daemon socket directory.
      - type: bind
        source: /var/run/ats
        target: /var/run/ats

    # T-443 (audit-2026-05-26 infra M9): resource caps. Before this the
    # container was uncapped -- a runaway loop in the backend could starve
    # host nginx of CPU/RAM during market hours. mem_limit is the hard
    # OOM cap; mem_reservation is the soft hint; cpus caps total vCPU
    # share (host has 4 OCPU on Ampere A1.Flex, so 1.5 leaves 2.5 for
    # nginx + cron + host).
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.5

    # T-467 (audit-2026-05-26 infra M8): explicit tmpfs for /tmp at 64M.
    # Default container tmpfs is unset = no mount (overlay disk), or
    # 32M if anyone enables it later. SIP/factor-tilt CSV staging + the
    # libsodium scratch allocations spike to ~30M briefly; 64M leaves
    # margin without forcing operator intervention.
    tmpfs:
      - /tmp:size=64m,mode=1777
