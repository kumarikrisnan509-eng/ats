# Staging compose -- run alongside the prod compose on the same OCI VM.
# Bound to a separate port (8081) + separate persistent volume.
# BROKER=mock so it never hits real Kite (safe to break, redeploy at will).
#
# T-212 (CODE-AUDIT F.5 M3.3): brought to PARITY with prod hardening. Before
# this commit the staging compose ran without `read_only:true`, `cap_drop:
# ALL`, `no-new-privileges`, `mem_limit`, `pids_limit`, or the `/etc/ats`
# read-only mount. Staging would NOT have caught container-permission
# regressions that landed in prod. Now staging is a true pre-prod gate.
#
# Install:
#   sudo cp deploy/staging/docker-compose.staging.yml /opt/ats/staging/
#   sudo mkdir -p /opt/ats/staging-data /opt/ats/staging-logs
#   cd /opt/ats/staging
#   sudo docker compose --env-file .env up -d
#
# .env for staging:
#   ATS_REPO_OWNER=kumarikrisnan509-eng
#   ATS_IMAGE_TAG=latest
#   ATS_PORT_HOST=8081
#   BROKER=mock
#   ENV_NAME=staging
#   KILL_SWITCH=true
#   LIVE_TRADING=false

services:
  ats-backend-staging:
    image: "ghcr.io/${ATS_REPO_OWNER}/ats-backend:${ATS_IMAGE_TAG:-latest}"
    container_name: ats-backend-staging
    restart: unless-stopped
    # Only expose to loopback. Nginx on the host fronts this at
    # staging.ats.rajasekarselvam.com.
    ports:
      - "127.0.0.1:${ATS_PORT_HOST:-8081}:8080"
    environment:
      - BROKER=${BROKER:-mock}
      - ENV_NAME=${ENV_NAME:-staging}
      - KILL_SWITCH=${KILL_SWITCH:-true}
      # T-212: explicit LIVE_TRADING=false default — defense-in-depth
      # against an operator accidentally pointing real broker creds at
      # staging. Even with KILL_SWITCH off, this gate would also need
      # to be flipped before any order routes to broker.placeOrder.
      - LIVE_TRADING=${LIVE_TRADING:-false}
      - PAPER_PATH=/var/lib/ats/tokens/_paper.json
      - PNL_PATH=/var/lib/ats/tokens/_pnl-daily.json
      - AUTORUN_PATH=/var/lib/ats/tokens/_autorun.json
      - NEWS_PATH=/var/lib/ats/tokens/_news.json
      - TAX_PATH=/var/lib/ats/tokens/_tax.json
      # Staging does NOT mount a real master.key. The vault.open path will
      # 503 when it tries to seal/unseal, which is correct for staging —
      # we don't want broker creds usable here even if someone seeded them.
      - MASTER_KEY_PATH=/run/secrets/master.key
    volumes:
      # Separate staging data volume so staging persists across container
      # restarts but does not share state with prod.
      - type: bind
        source: /opt/ats/staging-data
        target: /var/lib/ats/tokens
      # Separate log dir so prod logrotate + audit-archive don't collide.
      - type: bind
        source: /opt/ats/staging-logs
        target: /var/log/ats
      # T-212: same /etc/ats read-only mount as prod, but staging gets
      # access to ONLY a placeholder master.key (32 random bytes the
      # operator generated locally — distinct from prod's key). This
      # gives staging the same code path as prod (vault initialises) but
      # ensures any sealed cells in staging are unrecoverable by anyone
      # who also has access to prod state.
      - type: bind
        source: /etc/ats-staging
        target: /etc/ats
        read_only: true
      # T-212: master.key mount, distinct from prod's /etc/ats/master.key.
      # If /etc/ats-staging/master.key does not exist, the container fails
      # to start with a clear error (correct behavior — staging should
      # fail loud, not silently fall back to no encryption).
      - type: bind
        source: /etc/ats-staging/master.key
        target: /run/secrets/master.key
        read_only: true
    # T-212 hardening (parity with prod):
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=32m
    mem_limit: 384m   # slightly tighter than prod (512m) — staging is single-tenant + no live broker
    pids_limit: 192
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: journald
      options:
        tag: ats-backend-staging
