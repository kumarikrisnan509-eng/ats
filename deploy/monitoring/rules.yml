# Alert rules for ATS. Loaded by Prometheus via rule_files in prometheus.yml.

groups:
  - name: ats.broker
    interval: 30s
    rules:
      - alert: BrokerDisconnected
        expr: ats_broker_connected == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Broker disconnected from live ticks for 2+ min"
          description: "ats.rajasekarselvam.com broker.health.connected has been 0 for 2m. Check VM, KiteTicker, network."

      - alert: NoTicksRecently
        expr: time() - ats_last_tick_seconds > 120
        for: 3m
        labels: { severity: warning }
        annotations:
          summary: "No tick received in 2+ minutes during market hours"

  - name: ats.health
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="ats"} == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "ATS /metrics endpoint not responding"

      - alert: HighErrorRate
        expr: rate(ats_request_errors_total[5m]) > 0.5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "API error rate > 0.5/s for 5 min"

  - name: ats.paper
    interval: 60s
    rules:
      - alert: PaperPersistFailures
        expr: increase(ats_paper_persist_failures_total[5m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Paper trading state persist failed (disk full? perms?)"

      - alert: ReconcileDriftAccelerating
        expr: abs(ats_reconcile_cash_drift) > 100000
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Paper-vs-broker cash drift exceeds INR 1L for 5 min"

  # T-204 (CODE-AUDIT E.11 #2): host + container + alert-pipeline health.
  # These rules require node_exporter (job_name: node) and cadvisor
  # (job_name: cadvisor) to be scraped -- see deploy/monitoring/node-exporter.compose.yml.
  - name: ats.infra
    interval: 60s
    rules:
      - alert: DiskAlmostFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 10m
        labels: { severity: critical }
        annotations:
          summary: "Disk < 15% free on {{ $labels.mountpoint }} ({{ $labels.instance }})"
          description: "audit.log + sealed tokens live on the VM disk. A full disk halts the audit append, which on T-110 process.exit(1)s the backend. Free space immediately."

      - alert: HostHighMemory
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 15
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Host available memory < 15% for 5 min"
          description: "OCI Ampere A1 has limited RAM. Likely the playwright-driven auto-login daemon or a leaky Chromium. Check `docker stats` and consider restarting the daemon."

      - alert: ContainerRestartLooping
        expr: rate(container_start_time_seconds[15m]) > 0.0011
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Container {{ $labels.name }} has restarted > 1x in 15 min"
          description: "Threshold 0.0011/s = ~1 restart per 15 min. If ats-backend is the offender, /api/health is the next thing to check. T-201 health-monitor workflow will also page on this."

      - alert: AlertmanagerDown
        expr: absent(up{job="alertmanager"}) or up{job="alertmanager"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Alertmanager itself is down — alerts are not being delivered"
          description: "Without Alertmanager, every other alert in this file is silenced. Restart it from /opt/monitoring."

      - alert: TelegramBridgeDown
        expr: absent(up{job="telegram-bridge"}) or up{job="telegram-bridge"} == 0
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Telegram bridge unreachable — Alertmanager has no way to page"
          description: "The bridge translates Alertmanager webhooks into Telegram messages. T-204 wrapped it in systemd; check `systemctl status ats-telegram-bridge`."

      - alert: CertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: "TLS certificate expires in < 14 days"
          description: "Let's Encrypt autorenew should run via certbot. If this fires, check `systemctl list-timers | grep certbot` and the renewal log."
