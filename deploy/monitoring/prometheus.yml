# Prometheus scrape config for ATS.
# Install on a separate small VM or use Grafana Cloud free tier.
#
# Quick-start (Docker on the same OCI VM as ATS, separate compose):
#   docker run -d --name prom --network host -v $(pwd):/etc/prometheus prom/prometheus

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: ats-prod

rule_files:
  - rules.yml

scrape_configs:
  - job_name: ats
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ['ats.rajasekarselvam.com']
    # Auth via X-Metrics-Token header (set ATS_METRICS_TOKEN env on the VM)
    bearer_token_file: /etc/prometheus/metrics_token
    # Alternative: use the header approach
    # external_labels: are added to ALL series for routing.

  # T-204 (CODE-AUDIT E.11 #2): host-level metrics (disk, mem, cpu, fs, net).
  # Closes the audit gap "no disk-full / OOM / runaway-CPU alert today".
  # See deploy/monitoring/node-exporter.compose.yml.
  - job_name: node
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['127.0.0.1:9100']

  # T-204: per-container metrics (restart count, mem, cpu throttling).
  # Catches the "ats-backend is restart-looping" failure mode.
  - job_name: cadvisor
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['127.0.0.1:8079']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']
