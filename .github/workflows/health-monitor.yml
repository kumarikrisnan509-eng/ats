# T-201 (CODE-AUDIT F.5 M2.5): scheduled live health monitor.
#
# Hits /api/health and /api/health-deep against production every 15 minutes
# during market hours (Mon-Fri, 09:00-15:30 IST = 03:30-10:00 UTC). Any non-2xx
# response, or a deep-health field signalling stalled broker or expired DR
# backup, fails the workflow. GitHub Actions emails the repo owner on failed
# workflow runs, so the operator gets paged.
#
# Why not Prometheus/Alertmanager? The existing monitoring stack scrapes
# /metrics every 30s but currently has NO alert rule that emails or pages the
# operator on /api/health-deep field anomalies (brokerWsStalled, drStale, etc.).
# Wiring that into Alertmanager is in the audit backlog (E.11 #2). This
# GitHub-side monitor is the cheap defense-in-depth in the meantime.

name: health-monitor

on:
  schedule:
    # T-453 (audit-2026-05-26 infra L9): bumped from */15 to */10 so an
    # outage at the 09:15 IST market open is detected within 10 min instead
    # of the previous worst-case 15 min (the 09:00 UTC slot was 15 min too
    # early to catch a 09:15 IST market-open failure). Window stays the
    # same: 03:00-10:59 UTC = 08:30-16:29 IST, Mon-Fri.
    - cron: '*/10 3-10 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    name: probe production
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: GET /api/health (must return ok:true)
        # Retry once with a 15s wait to ride out a docker compose restart
        # window (typical ~15-20s). Only the SECOND failure fails the workflow.
        run: |
          set -e
          BASE="${ATS_BASE_URL:-https://ats.rajasekarselvam.com}"
          probe() {
            RESP=$(curl -sS -m 10 -w "\nHTTP_STATUS=%{http_code}" "${BASE}/api/health" || true)
            STATUS=$(echo "$RESP" | grep -oP 'HTTP_STATUS=\K\d+' || echo 0)
            BODY=$(echo "$RESP" | sed '/^HTTP_STATUS=/d')
            if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q '"ok":true'; then
              echo "::notice::/api/health ok (HTTP $STATUS)"
              return 0
            fi
            echo "probe attempt failed: HTTP=$STATUS body=$(echo "$BODY" | head -c 200)"
            return 1
          }
          probe || { echo "::warning::probe 1 failed, sleep 15s (likely deploy restart)"; sleep 15; probe || { echo "::warning::probe 2 failed, sleep 20s"; sleep 20; probe || { echo "::error::/api/health still failing after 3 attempts (~35s)"; exit 1; }; }; }

      - name: GET /api/health-deep (broker + DR + market signals)
        # Retry once with a 15s wait. The deep endpoint is slightly heavier
        # than /api/health, so it's more likely to return an empty body during
        # restart -- which is what triggered the 2026-05-21 14:20 UTC false
        # positive.
        run: |
          set -e
          BASE="${ATS_BASE_URL:-https://ats.rajasekarselvam.com}"
          fetch_deep() {
            curl -sS -m 10 "${BASE}/api/health-deep" || true
          }
          RESP=$(fetch_deep)
          if [ -z "$RESP" ] || ! echo "$RESP" | head -c 1 | grep -q '{'; then
            echo "::warning::1st deep probe returned empty/non-JSON, sleeping 15s then retrying once"
            sleep 15
            RESP=$(fetch_deep)
            if [ -z "$RESP" ] || ! echo "$RESP" | head -c 1 | grep -q '{'; then
              echo "::error::health-deep returned non-JSON twice (after 15s retry): $(echo "$RESP" | head -c 200)"
              exit 1
            fi
          fi
          # Parse with python because jq isn't guaranteed on ubuntu-latest
          # (it is, but this is more portable + lets us emit GH-style annotations).
          echo "$RESP" | python3 - <<'PY'
          import sys, json
          body = sys.stdin.read()
          try:
              d = json.loads(body)
          except Exception as e:
              print(f'::error::health-deep returned non-JSON: {body[:300]}')
              sys.exit(1)

          # Top-level ok flag.
          if not d.get('ok'):
              print(f'::error::health-deep ok:false  body={body[:500]}')
              sys.exit(1)

          # Surface stalled-broker / DR-stale signals as failures so the workflow
          # fails and GitHub emails the operator.
          checks = d.get('checks', {}) or {}
          fails = []

          br = checks.get('broker', {}) or {}
          if br.get('stalledOnToken'):
              fails.append(f'broker.stalledOnToken=true (token age {br.get("accessTokenAgeMin")} min)')
          if br.get('tickStale'):
              fails.append(f'broker.tickStale=true (last tick {br.get("lastTickAgoSec")}s ago)')
          if br.get('reconnectAttempts', 0) >= 5:
              fails.append(f'broker.reconnectAttempts={br.get("reconnectAttempts")} (>=5)')

          dr = checks.get('dr', {}) or {}
          if dr.get('drStale'):
              fails.append(f'dr.drStale=true (last successful archive {dr.get("lastArchiveAgeHours")}h ago)')

          # During market hours we ALSO require a recent tick. The cron only fires
          # during the trading window per the schedule, so we don't gate on time.
          mk = checks.get('market', {}) or {}
          if mk.get('isOpen') and not br.get('connected'):
              fails.append('market.isOpen=true but broker.connected=false')

          if fails:
              for f in fails:
                  print(f'::error::{f}')
              sys.exit(1)
          print('::notice::/api/health-deep all checks green')
          PY

      - name: GET /api/status (preflight)
        run: |
          set -e
          BASE="${ATS_BASE_URL:-https://ats.rajasekarselvam.com}"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 10 "${BASE}/api/status")
          if [ "$STATUS" != "200" ]; then
            echo "::error::/api/status returned HTTP ${STATUS}"
            exit 1
          fi
          echo "::notice::/api/status ok"
