# T-364: PR + post-deploy validation.
#
# Trigger model (after T-364):
#   - pull_request -> runs immediately (validates the PR's code; Playwright
#                     hits the live URL, which is still the pre-merge bundle).
#   - workflow_run -> runs AFTER the deploy workflow completes on main.
#                     This sequences CI after deploy so the prod-readiness
#                     spec sees the JUST-DEPLOYED bundle, not the OLD one.
#                     Before T-364, ci.yml and deploy.yml both triggered on
#                     `push: branches: [main]` and raced -- CI tested the
#                     pre-deploy bundle ~80% of the time, false-failing on
#                     every fix that touched a hardcoded fixture string (the
#                     Claude Haiku saga in T-358..T-361 was entirely this).
#   - workflow_call -> internal reuse from other workflows.
#
# Skip-condition on workflow_run: if deploy failed, don't bother running CI
# (deploy is gated by its own validate-step Playwright so a failed deploy
# means the bundle didn't even rsync -- testing it is meaningless).
name: ci

on:
  pull_request:
    branches: [main]
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

jobs:
  validate:
    name: validate (lint + syntax)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # T-447 (audit-2026-05-26 infra M12): job-level permissions override the
    # caller's. When deploy.yml calls this workflow via `uses:`, GitHub
    # applies the CALLER's permissions to the reusable workflow's jobs by
    # default. deploy.yml had packages:write + id-token:write at the top
    # level (now scoped per-job by T-430, but defense-in-depth here matters
    # too). Explicitly pinning the validate job to read-only ensures it
    # CANNOT push to GHCR or sign artifacts even when called from a
    # workflow that has those permissions.
    permissions:
      contents: read
    # T-364: when triggered by workflow_run, only proceed if the upstream
    # deploy succeeded. (pull_request + workflow_call always run.)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # T-469 infra M14: pinned to actions/checkout@v6.0.2

      - name: Set up Node 20
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # T-469 infra M14: pinned to actions/setup-node@v5
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: deploy/backend/package-lock.json

      # T-463 (audit-2026-05-26 infra L10): cache the THROWAWAY tool
      # installs from later steps (@babel/parser, typescript, eslint).
      # Each step previously did `mkdir .ci-tmp && npm install --no-save`
      # which re-downloaded ~30MB per step per run. Keyed by the tool
      # versions pinned in the install commands so a bump invalidates
      # cleanly. Saves ~30-45s per CI run.
      - name: Cache CI throwaway tool installs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # T-469 infra M14: pinned to actions/cache@v4
        with:
          path: |
            .ci-tmp
            .ci-tmp-tsc
            .ci-tmp-eslint
          key: ci-tools-v1-${{ runner.os }}-babel7-tsc5.4.5-eslint8

      - name: Install backend deps
        working-directory: deploy/backend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Dependency vulnerability scan (npm audit -- BLOCKING, T-199 / T-474)
        working-directory: deploy/backend
        run: |
          # T-199 (CODE-AUDIT D.9 #5): flipped from continue-on-error to blocking.
          # T-171 cleared all 8 high-severity vulns; this gate keeps them clear.
          # T-474 (audit-2026-05-26 infra H6): tightened from --audit-level=high to
          # --audit-level=moderate. T-474 cleared the lone moderate (qs 6.15.1 -> 6.15.2
          # for GHSA-q8mj-m7cp-5q26); the gate now catches the next moderate before it
          # ships. A new transitive moderate fails the build; operator either runs
          # `npm audit fix` (preferred, lockfile-only when possible) or documents an
          # exception. We deliberately stop short of `--audit-level=low` because the
          # `low` bucket fluctuates daily and would whack-a-mole the CI gate.
          echo "=== npm audit summary (machine-readable) ==="
          npm audit --json | python3 -c "import sys, json; d=json.load(sys.stdin); m=d.get('metadata',{}).get('vulnerabilities',{}); print('counts:', m); total=sum(m.values()); print('::notice::npm audit total vulnerabilities:', total)" || true
          echo ""
          echo "=== npm audit (moderate+, blocking) ==="
          npm audit --audit-level=moderate

      - name: Syntax-check backend JS
        run: |
          set -e
          for f in $(find deploy/backend -name '*.js' -not -path '*/node_modules/*'); do
            node --check "$f"
          done
          echo "backend JS OK"

      - name: Require-order check (T-215 -- catch TDZ violations pre-deploy)
        run: |
          set -e
          # T-215 (CODE-AUDIT M1.4 followup after T-214 TDZ failure):
          # JavaScript const is NOT hoisted; a require destructure placed
          # AFTER its use site causes the container to fail to boot with
          # "Cannot access X before initialization". The T-214 strategies
          # extract hit exactly this -- production saved by the auto-rollback
          # safety net but downtime would have been worse without it.
          # This check fails the build if any `const { X } = require('./
          # routes/...')` or `./services/...` line in server.js comes
          # AFTER a use of X.
          python3 deploy/scripts/check-require-order.py deploy/backend/server.js
      - name: nginx config structural check (T-418c -- catch truncated/malformed configs pre-deploy)
        run: |
          # T-418c (replaces fragile T-418 nginx -t step):
          # The original step shelled out to `nginx -t` against a stubbed conf
          # tree (apt-install + stub TLS certs + sed-rewrite paths + openssl
          # dhparam + heredoc nginx.conf). That step kept failing on the GH
          # runner for fragile reasons (openssl dhparam 256 rejected by
          # OpenSSL 3, heredoc expansion timing). The cure (inlining a brace
          # check via `python3 - <<'PYEOF'`) broke YAML when '\n' inside the
          # Python regex got interpreted as a real newline.
          #
          # This standalone script catches the EXACT failure that bit prod in
          # T-412b (truncated config) without any of that ceremony.
          python3 deploy/scripts/check-nginx-conf.py

      - name: Lint static HTML (basic checks)
        run: |
          set -e
          test -f app.html
          test -f styles.css
          test -d src
          # JSX files must parse as JS-with-JSX. Install @babel/parser into a throwaway dir, then require it.
          # Stub package.json prevents npm from walking up to the repo-root package.json
          # (added for local dev loop) and installing into the wrong node_modules.
          # T-463 infra L10: skip npm install when actions/cache restored the tree.
          mkdir -p .ci-tmp && cd .ci-tmp
          if [ ! -d node_modules/@babel/parser ]; then
            echo '{"name":"ci-tmp","version":"0.0.0","private":true}' > package.json
            npm install --silent --no-save --no-package-lock @babel/parser@7 >/dev/null
          fi
          cd ..
          node -e '
            const parser = require("./.ci-tmp/node_modules/@babel/parser");
            const fs = require("fs"), path = require("path");
            const dir = "src";
            let bad = 0;
            for (const f of fs.readdirSync(dir)) {
              if (!f.endsWith(".jsx")) continue;
              const code = fs.readFileSync(path.join(dir, f), "utf8");
              try {
                parser.parse(code, { sourceType: "script", plugins: ["jsx"] });
                console.log("OK  " + f);
              } catch (e) {
                console.error("FAIL " + f + " :: " + e.message);
                bad++;
              }
            }
            if (bad > 0) { console.error(bad + " JSX file(s) failed to parse"); process.exit(1); }
          '
          # T-463 infra L10: KEEP .ci-tmp around — actions/cache uploads it
          # at end of job; deleting here defeats the cache.

      - name: Duplicate top-level const guard (.jsx)
        run: |
          set -e
          # Browser script-tags share a script-level lexical environment.
          # If two .jsx files both declare `const X = ...` (or `const _x = ...`) at column 0, the second
          # throws SyntaxError on page load and silently breaks that screen's
          # window.* export (see fcefb3b: the Field/SettingsScreen blank-page bug).
          python3 - <<'PY'
          import os, re, collections, sys
          locs = collections.defaultdict(list)
          for fn in sorted(os.listdir('src')):
              if not fn.endswith('.jsx'): continue
              with open('src/' + fn) as f: src = f.read()
              for m in re.finditer(r'^const ([_A-Za-z][A-Za-z0-9_]*) =', src, flags=re.MULTILINE):
                  locs[m.group(1)].append(fn)
          dupes = {k:v for k,v in locs.items() if len(v) > 1}
          if dupes:
              for name, files in sorted(dupes.items()):
                  print(f'!! duplicate top-level const {name!r} -> {files}', file=sys.stderr)
              print(f'\n{len(dupes)} collision(s) -- rename or scope locally.', file=sys.stderr)
              sys.exit(1)
          print('no duplicate top-level const identifiers across .jsx files')
          PY

      - name: JSDoc type check (Phase B-1 -- tsc --noEmit --checkJs on opted-in files)
        run: |
          set -e
          # T-312a: gradual JSDoc typecheck. Catches the attribution/slippage
          # class of shape-mismatch bug (UI reads r.regime as string when
          # backend ships {label, confidence}) at edit time. Files opt in by
          # adding `// @ts-check` and an @type annotation on the fetch result;
          # see types/api-shapes.d.ts for the canonical shape definitions.
          # Currently checks 2 files; expand tsconfig.json::include as more
          # screens migrate.
          # T-463 infra L10: skip npm install when actions/cache restored the tree.
          mkdir -p .ci-tmp-tsc && cd .ci-tmp-tsc
          if [ ! -d node_modules/typescript ]; then
            echo '{"name":"ci-tmp-tsc","version":"0.0.0","private":true}' > package.json
            npm install --silent --no-save --no-package-lock typescript@5.4.5 >/dev/null
          fi
          cd ..
          ./.ci-tmp-tsc/node_modules/.bin/tsc --noEmit -p tsconfig.json
          # T-463 infra L10: KEEP .ci-tmp-tsc for the cache. See note above.
          echo "JSDoc typecheck OK"

      - name: ESLint backend (T-381 -- catch ReferenceError class pre-deploy)
        run: |
          set -e
          # T-381 (architecture audit MED, high signal): ESLint with no-undef +
          # no-redeclare catches the bug class that bit T-377 (verifyTokenForUrl
          # ReferenceError -- undefined identifier inside a function body that
          # node --check cannot detect). Same .ci-tmp pattern as the @babel/parser
          # and tsc steps -- no package-lock mutation, throwaway install.
          # On the initial sweep this caught an undeclared `nseMacroFetcher`
          # in server.js (implicit global from CommonJS non-strict-mode), now
          # fixed. Going forward this gate prevents the same class from
          # re-shipping.
          mkdir -p .ci-tmp-eslint && cd .ci-tmp-eslint
          echo '{"name":"ci-tmp-eslint","version":"0.0.0","private":true,"type":"module"}' > package.json
          npm install --silent --no-save --no-package-lock eslint@9 >/dev/null
          cd ..
          ./.ci-tmp-eslint/node_modules/.bin/eslint --max-warnings=1000 deploy/backend/
          rm -rf .ci-tmp-eslint
          echo "ESLint backend OK"

      - name: Backend unit tests (node:test)
        working-directory: deploy/backend
        env:
          # T-150: enable _runner.js strict mode so test failures hard-fail
          # the validate step. Before this flag, the runner deferred to the
          # underlying node --test exit code which could mask failures in
          # some shells/sandboxes (see T-144). The full suite passes 371/371
          # locally with better-sqlite3 properly installed (which 'npm ci'
          # does in CI), so flipping strict is safe from this commit forward.
          ATS_TEST_STRICT: "1"
        run: |
          if [ -f package.json ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "no test script defined -- skipping"
          fi

      - name: Playwright smoke tests (blocking, against live URL)
        # T-199 (CODE-AUDIT D.9 #5): used to skip on PRs to keep CI fast, which
        # meant E2E regressions only surfaced AFTER merge to main. Now runs on
        # PRs too. If the suite gets too slow (>10min) consider splitting into
        # a fast subset for PRs and a full suite on push, but for now keep
        # parity so PR reviewers see the same gate that blocks deploy.
        working-directory: test-e2e
        env:
          # Phase E v6: prod synthetic e2e user credentials. global-setup.js
          # reads these to log in and capture session cookies, so
          # visual-snapshots.spec.js can pixel-diff auth-gated screens.
          # If the secrets are absent (e.g. PR from a fork has no secrets
          # access), the spec falls back to skip-on-no-cookies.
          PROD_E2E_EMAIL:    ${{ secrets.PROD_E2E_EMAIL }}
          PROD_E2E_PASSWORD: ${{ secrets.PROD_E2E_PASSWORD }}
        # T-175: continue-on-error REMOVED. All 80 specs green as of T-174,
        # so we now block the deploy if any E2E test regresses. If a real
        # regression ships, the deploy step won't run and the VM keeps the
        # last good image. To re-quarantine a flake, prefer fixing the spec
        # over re-adding continue-on-error.
        run: |
          if [ -f package.json ]; then
            npm install --silent --no-audit --no-fund
            npx playwright install --with-deps chromium
            npx playwright test --reporter=list
          fi

      - name: Secret-leak guard
        run: |
          set -e
          # Hard fail if anything that looks like a secret is committed.
          # T-190: added ghp_/github_pat_ patterns after SECRETS-AUDIT P0 #1 found
          # 31 files with hardcoded PATs. The PAT chars after the prefix are 36 for
          # classic tokens and 82 for fine-grained `github_pat_*`. Regexes use {30,}
          # to stay tolerant to future format changes while still catching real leaks.
          ! grep -RIn --exclude-dir=node_modules --exclude-dir=.git \
              -e 'ZERODHA_API_SECRET=[A-Za-z0-9]\+' \
              -e 'BEGIN RSA PRIVATE KEY' \
              -e 'BEGIN OPENSSH PRIVATE KEY' \
              -e 'GHCR_TOKEN=ghp_' \
              -e 'ghp_[A-Za-z0-9]\{30,\}' \
              -e 'github_pat_[A-Za-z0-9_]\{80,\}' \
              .
          # Master key, audit log, sealed tokens must never be committed.
          for path in deploy/backend/master.key deploy/backend/audit.log deploy/backend/tokens; do
            if [ -e "$path" ]; then echo "!! committed: $path" >&2; exit 1; fi
          done
          echo "no leaks detected"
