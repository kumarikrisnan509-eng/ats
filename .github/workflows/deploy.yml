# Auto-deploy to rajasekarselvam.com on every push to main.
#
# Pipeline:
#   1. validate (re-uses logic from ci.yml — fail fast)
#   2. build & push image to ghcr.io/<owner>/ats-backend
#   3. SSH into the OCI VM and run deploy-on-vm.sh
#
# Required GitHub Secrets (Settings -> Secrets and variables -> Actions):
#   OCI_SSH_HOST            : VM hostname or IP (e.g. rajasekarselvam.com)
#   OCI_SSH_USER            : deploy user on the VM (e.g. deployer)
#   OCI_SSH_PRIVATE_KEY     : private key whose pub key is in deployer's ~/.ssh/authorized_keys
#   OCI_SSH_KNOWN_HOSTS     : ssh-keyscan output for the host (anti-MITM)
#   GHCR_PULL_TOKEN         : a fine-grained PAT with read:packages, used by the VM to pull from GHCR.
#                             (We don't strictly need a PAT — GITHUB_TOKEN works for push from CI.
#                              The VM needs its own credential; a PAT is the simplest.)
#
# No broker keys live in GitHub. Those stay in /etc/ats/backend.env on the VM only.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# T-473 (audit-2026-05-26 infra M11): the concurrency group below DOES
# cover workflow_dispatch — per GitHub docs, the `group:` key matches
# across all trigger types (push, workflow_dispatch, schedule, etc.).
# Verified by reading the run history: workflow_dispatch + push runs
# queue in the same FIFO and never execute concurrently. The audit's
# concern about a manual dispatch racing a push is therefore moot.
concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never preempt a deploy mid-flight

# T-430 (audit-2026-05-26 infra H7): tighten workflow-level token to
# minimum (read-only). Each job opts back in to what it needs:
#   - validate:       contents:read (inherits from re-used ci.yml)
#   - build-and-push: contents:read + packages:write (image push to GHCR)
#   - deploy:         contents:read (just SSH + scp, no GitHub API writes)
# This stops a compromised step in `deploy` from being able to push a
# rogue image to GHCR.
permissions:
  contents: read

env:
  IMAGE_NAME: ats-backend
  REGISTRY: ghcr.io

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # T-430 H7: only this job needs to push to GHCR.
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_tag:  ${{ steps.meta.outputs.short_sha }}
      image_ref:  ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # T-469 infra M14: pinned to actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # T-469 infra M14: pinned to docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # T-469 infra M14: pinned to docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          short=$(echo "${GITHUB_SHA}" | cut -c1-12)
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ref="${{ env.REGISTRY }}/${owner_lc}/${{ env.IMAGE_NAME }}"
          echo "short_sha=${short}"             >> "$GITHUB_OUTPUT"
          echo "owner_lc=${owner_lc}"           >> "$GITHUB_OUTPUT"
          echo "image_ref=${ref}"               >> "$GITHUB_OUTPUT"
          echo "tags=${ref}:${short},${ref}:latest" >> "$GITHUB_OUTPUT"

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # T-469 infra M14: pinned to docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: false

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://ats.rajasekarselvam.com

    steps:
      - name: Checkout (need deploy/ scripts to sync to VM)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # T-469 infra M14: pinned to actions/checkout@v5

      - name: Configure SSH
        run: |
          set -e
          # T-430 (audit-2026-05-26 infra H8): umask before any file write
          # ensures the SSH key file is created 0600 atomically (not 0644
          # then chmod). Eliminates a tiny window where another process on
          # the runner could read the key. Runners are ephemeral but the
          # tightening is free.
          umask 077
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write key via umask, then explicit chmod as belt-and-suspenders.
          printf '%s\n' "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.OCI_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync latest deploy scripts to VM
        run: |
          set -e
          scp -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              deploy/scripts/deploy-on-vm.sh \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}:/tmp/deploy-on-vm.sh.new"
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
              "mv /tmp/deploy-on-vm.sh.new /opt/ats/scripts/deploy-on-vm.sh && chmod +x /opt/ats/scripts/deploy-on-vm.sh"
          scp -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              deploy/docker/docker-compose.yml \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}:/tmp/docker-compose.yml.new"
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
              "mv /tmp/docker-compose.yml.new /opt/ats/compose/docker-compose.yml"
          # T99-T36+T39+T41: sync DR + backup + nginx-staging scripts to VM.
          scp -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              deploy/scripts/dr-restore-test.sh \
              deploy/scripts/setup-dr-cron.sh \
              deploy/scripts/backup-db-tokens.sh \
              deploy/scripts/ats-archive.sh \
              deploy/scripts/repair-rclone-wrapper.sh \
              deploy/scripts/sync-nginx-config.sh \
              deploy/scripts/setup-auto-login-cron.sh \
              deploy/scripts/setup-auto-login-daemon.sh \
              deploy/scripts/auto-login-daemon.js \
              deploy/scripts/auto-login-host.js \
              deploy/scripts/ats-auto-login-daemon.service \
              deploy/scripts/setup-all.sh \
              deploy/scripts/setup-rclone-archive.sh \
              deploy/scripts/setup-backup-passphrase.sh \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}:/tmp/"
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
              "for f in dr-restore-test.sh setup-dr-cron.sh backup-db-tokens.sh ats-archive.sh repair-rclone-wrapper.sh sync-nginx-config.sh setup-auto-login-cron.sh setup-auto-login-daemon.sh auto-login-daemon.js auto-login-host.js ats-auto-login-daemon.service setup-all.sh setup-rclone-archive.sh setup-backup-passphrase.sh; do mv /tmp/\$f /opt/ats/scripts/\$f && chmod +x /opt/ats/scripts/\$f 2>/dev/null || true; done"
          # T99-T41: stage nginx configs so sync-nginx-config.sh can install them.
          # We don't apply them automatically — operator runs sync-nginx-config.sh once
          # so any breaking nginx change is caught at their hands, not mid-deploy.
          scp -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              deploy/nginx/ats.rajasekarselvam.com.conf \
              deploy/nginx/rajasekarselvam.com.conf \
              deploy/nginx/ats-security-headers.conf \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}:/tmp/"
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
              "mkdir -p /opt/ats/scripts/nginx-staged && mv /tmp/*.conf /opt/ats/scripts/nginx-staged/"

      - name: Trigger deploy on VM
        env:
          OWNER:          ${{ needs.build-and-push.outputs.image_ref }}
          TAG:            ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -e
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${{ secrets.OCI_SSH_USER }}@${{ secrets.OCI_SSH_HOST }}" \
              "ATS_GHCR_TOKEN=${GHCR_PULL_TOKEN} bash /opt/ats/scripts/deploy-on-vm.sh ${TAG} ${owner_lc}"

      - name: Post-deploy smoke test (public URL)
        run: |
          set -e
          # Wait up to 30 s for the public health endpoint to respond, in case Nginx is reloading.
          for i in $(seq 1 15); do
            if curl -fsS -o /tmp/h.json -w "%{http_code}" https://ats.rajasekarselvam.com/api/health | grep -q '^200$'; then
              echo "public /api/health OK"
              cat /tmp/h.json
              exit 0
            fi
            sleep 2
          done
          ech